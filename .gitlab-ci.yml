# GitLab CI for rell-playground.
#
# Three jobs:
#  - rell-java17: clones Rell at the pinned tag, re-targets to Java 17
#                 bytecode (CheerpJ caps at JRE 17), publishes the 6 modules
#                 the bridge depends on into a transferable Maven repo, and
#                 also builds the bridge shadow JAR ready for the SPA.
#  - build:       Bun-based SPA build that consumes the shadow JAR.
#  - pages:       publishes dist/ to GitLab Pages on the default branch.

stages:
  - rell
  - build
  - deploy

variables:
  GIT_SUBMODULE_STRATEGY: none
  # Force Gradle's build cache (task output reuse) + configuration cache so
  # incremental work survives across CI invocations. -Dorg.gradle.caching=true
  # is the same as passing --build-cache on every invocation; keeping it in
  # GRADLE_OPTS means we don't have to remember to add it to each ./gradlew.
  # parallel=true is safe in CI since every job has its own runner.
  GRADLE_OPTS: "-Xmx4g -Dorg.gradle.caching=true -Dorg.gradle.parallel=true -Dorg.gradle.configuration-cache=true"
  # Pin Gradle's HOME under the project dir so it's reachable by cache:paths
  # (GitLab cache entries must live inside $CI_PROJECT_DIR). Everything
  # Gradle would normally write to ~/.gradle (downloaded distributions,
  # dependency cache, build-cache-1) lands here instead.
  GRADLE_USER_HOME: "${CI_PROJECT_DIR}/.gradle-user-home"
  # Shadow JAR for CheerpJ; the SPA build picks it up from web/public/jvm/.
  BRIDGE_JAR: "web/public/jvm/rell-playground-bridge-all.jar"
  JAVA_IMAGE: "eclipse-temurin:21-jdk"
  # The downgraded Rell artifacts are written into a job-local Maven dir
  # that the next stage mounts back in. Keeps ~/.m2 out of the cache.
  RELL_M2: ".m2-rell-java17"

rell-java17:
  stage: rell
  image: ${JAVA_IMAGE}
  # Only re-run when something that actually affects the shadow JAR changes.
  # Other pushes (e.g. SPA-only edits) reuse the cached web/public/jvm/ from
  # the build job's pull-only cache below.
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "trigger"
    - changes:
        - .gitlab-ci.yml
        - scripts/build-rell-java17.sh
        - bridge/**/*
        - gradle/libs.versions.toml
        - gradle/wrapper/**/*
        - build.gradle.kts
        - settings.gradle.kts
        - gradle.properties
        - gradlew
  cache:
    # Gradle caches: kept under $GRADLE_USER_HOME so a single tree captures
    # both this project's deps AND the Rell-source checkout's deps (the
    # build-rell-java17.sh ./gradlew calls share the same GRADLE_USER_HOME
    # via the env var). Build-cache-1 lives here too thanks to
    # org.gradle.caching=true above.
    - key: gradle-home-${CI_COMMIT_REF_SLUG}
      paths:
        - .gradle-user-home/caches/
        - .gradle-user-home/wrapper/
        - .gradle-user-home/notifications/
    # Project-local configuration cache (Gradle 8.x) — keyed per branch +
    # gradle version so a Gradle bump auto-invalidates.
    - key: gradle-project-${CI_COMMIT_REF_SLUG}
      paths:
        - .gradle/
        - .rell-src/.gradle/
    # Local Maven repo holding the Java-17-rebuilt Rell artifacts.
    - key: rell-maven-${CI_COMMIT_REF_SLUG}
      paths:
        - ${RELL_M2}/
    # `web/public/jvm/` is also cached here so subsequent skipped runs of
    # rell-java17 leave the SPA bridge JAR sitting on the runner for the
    # `build` job to pick up.
    - key: bridge-jar-${CI_COMMIT_REF_SLUG}
      paths:
        - web/public/jvm/
  before_script:
    # gzip is in coreutils (already present). git/python3 are needed by
    # build-rell-java17.sh (clone + idempotent in-place patches).
    - apt-get update -qq && apt-get install -y -qq git python3
  script:
    # `export` so the bash subshell that runs build-rell-java17.sh sees these
    # vars. Each `script:` line is a fresh `sh -c …` but they share env.
    - export RELL_REPO_URL="${RELL_REPO_URL:-https://gitlab.com/chromaway/rell.git}"
    - export RELL_TAG="${RELL_TAG:-0.15.4}"
    - export RELL_WORK_DIR="${CI_PROJECT_DIR}/.rell-src"
    # Job-local Maven repo. Both publishToMavenLocal and the bridge build
    # read/write here via a symlink at $HOME/.m2/repository. We use a symlink
    # (instead of -Dmaven.repo.local, which Gradle's mavenLocal() ignores) so
    # cache:paths can scope it under the project dir.
    - mkdir -p "${CI_PROJECT_DIR}/${RELL_M2}" "${HOME}/.m2"
    - rm -rf "${HOME}/.m2/repository"
    - ln -sfn "${CI_PROJECT_DIR}/${RELL_M2}" "${HOME}/.m2/repository"
    # 1. Build + publish the Java 17 Rell modules into mavenLocal.
    - bash scripts/build-rell-java17.sh
    # 2. Build the bridge shadow JAR + outer gzip pass against the
    #    just-published artifacts. settings.gradle.kts has mavenLocal() in
    #    repositories so resolution picks up the local 0.15.4 jars.
    - ./gradlew -PgitlabAuthHeaderValue=${CI_JOB_TOKEN} :bridge:build
    - test -f "${BRIDGE_JAR}"    || (echo "shadow JAR missing at ${BRIDGE_JAR}"    && exit 1)
    - test -f "${BRIDGE_JAR}.gz" || (echo "gzipped JAR missing at ${BRIDGE_JAR}.gz" && exit 1)
  artifacts:
    paths:
      # Ship the whole jvm/ folder — the SPA build (build.ts) copies
      # web/public/ verbatim into web/dist/, and the runtime worker fetches
      # /jvm/...jar.gz, so the .gz must survive the artifact handoff.
      - web/public/jvm/
    # never expire: the build job may need this artifact long after the
    # last rell-java17 run (the rules:changes filter intentionally skips
    # this job on SPA-only pushes). Runner caches are best-effort and
    # subject to LRU eviction, so we rely on the artifact as the
    # authoritative copy and fall back to it via the API in build's
    # before_script when cache misses.
    expire_in: never

build:
  stage: build
  image: ${JAVA_IMAGE}
  needs:
    # optional:true lets `build` proceed even when rell-java17 was skipped
    # by its rules:changes filter. When that happens, we restore the bridge
    # JAR from the cache instead of from artifacts.
    - job: rell-java17
      artifacts: true
      optional: true
  cache:
    - key: spa-${CI_COMMIT_REF_SLUG}
      paths:
        - web/node_modules/
    # Pull-only: when rell-java17 didn't run this pipeline, take the JAR
    # from whatever previous pipeline cached it. This is what makes
    # SPA-only changes deploy without paying the 5-10 min Rell rebuild tax.
    - key: bridge-jar-${CI_COMMIT_REF_SLUG}
      paths:
        - web/public/jvm/
      policy: pull
  before_script:
    # Bun is the build tool for the SPA. Install it next to the JDK image.
    - apt-get update -qq && apt-get install -y -qq curl unzip
    - curl -fsSL https://bun.sh/install | bash
    - export PATH="$HOME/.bun/bin:$PATH"
    - bun --version
    # If neither the optional rell-java17 needs-artifact nor the pull cache
    # produced the bridge JAR, fall back to the latest rell-java17 artifact
    # of the default branch via the GitLab API. expire_in:never on that
    # artifact guarantees a successful past pipeline is always retrievable.
    - |
      if [ ! -f "${BRIDGE_JAR}.gz" ]; then
        echo "Bridge JAR not present from needs/cache; pulling latest from API…"
        mkdir -p web/public/jvm
        DL="https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/jobs/artifacts/${CI_DEFAULT_BRANCH}/download?job=rell-java17"
        if curl -fsSL --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${DL}" -o /tmp/rell-jvm.zip; then
          unzip -o -q /tmp/rell-jvm.zip -d .
          rm -f /tmp/rell-jvm.zip
        else
          echo "API fallback failed (no successful rell-java17 artifact on ${CI_DEFAULT_BRANCH}?)"
        fi
      fi
  script:
    - test -f "${BRIDGE_JAR}.gz" || (echo "No ${BRIDGE_JAR}.gz from artifact, cache, or API fallback. Run rell-java17 manually to seed it." && exit 1)
    - cd web
    - bun install --frozen-lockfile
    - bun run build
  artifacts:
    paths: [ web/dist/ ]
    expire_in: 1 week

pages:
  stage: deploy
  image: alpine:3.20
  needs: [ build ]
  script:
    - rm -rf public
    - mv web/dist public
    # CI_PAGES_URL is a GitLab-predefined variable resolving to the served
    # URL for the current project's Pages site. Print it so it surfaces in
    # the job log; `environment.url` also makes it clickable in the GitLab
    # Pipelines / Environments UI.
    - 'echo "Pages deployed to: ${CI_PAGES_URL}/"'
  environment:
    name: pages
    url: ${CI_PAGES_URL}
  artifacts:
    paths: [ public ]
  rules: [ { if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH" } ]
